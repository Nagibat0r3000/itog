<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AES Vault</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f5f3ef;
      --surface: #ffffff;
      --border:  #e0ddd7;
      --ink:     #1a1814;
      --muted:   #9c9890;
      --accent:  #1a1814;
      --green:   #2d6a4f;
      --red:     #9b2226;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -.03em;
    }
    header p {
      color: var(--muted);
      font-size: .85rem;
      margin-top: .4rem;
      font-family: 'Fira Mono', monospace;
    }

    .main-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 700px;
      padding: 2rem;
    }

    .key-section {
      background: #f8f7f4;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 2rem;
    }

    .key-section h2 {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .key-input-wrapper {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .key-input {
      flex: 1;
      font-family: 'Fira Mono', monospace;
      font-size: 0.8rem;
      padding: 0.7rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: white;
      outline: none;
      transition: border-color 0.15s;
    }
    .key-input:focus {
      border-color: var(--ink);
    }
    .key-input::placeholder {
      color: var(--muted);
      font-family: 'Fira Mono', monospace;
      font-size: 0.7rem;
    }

    .btn-small {
      font-family: 'Fira Mono', monospace;
      font-size: 0.75rem;
      padding: 0.7rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-small:hover {
      border-color: var(--ink);
      background: var(--ink);
      color: white;
    }

    .key-hint {
      font-family: 'Fira Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .key-status {
      font-family: 'Fira Mono', monospace;
      font-size: 0.75rem;
      margin-top: 0.5rem;
      padding: 0.4rem 0.75rem;
      border-radius: 7px;
    }
    .key-status.ok  { background: #d8f3dc; color: var(--green); }
    .key-status.err { background: #f9dada; color: var(--red); }
    .key-status.hidden { display: none; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    .action-group {
      margin-bottom: 1.75rem;
    }

    .action-group h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .drop {
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .drop:hover, .drop.over { border-color: var(--ink); background: #f9f8f6; }
    .drop.filled { border-style: solid; border-color: #bbb; }

    .drop-label {
      font-size: 0.8rem;
      font-family: 'Fira Mono', monospace;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60%;
    }
    .drop.filled .drop-label { color: var(--ink); }

    .btn-pick {
      font-family: 'Fira Mono', monospace;
      font-size: 0.72rem;
      padding: 0.3rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      cursor: pointer;
      transition: border-color .15s;
      white-space: nowrap;
    }
    .btn-pick:hover { border-color: var(--ink); }

    .btn {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .btn-dark { background: var(--ink); color: #fff; }
    .btn-dark:hover:not(:disabled) { opacity: .85; }

    .action-status {
      font-family: 'Fira Mono', monospace;
      font-size: 0.75rem;
      margin-top: 0.75rem;
      padding: 0.5rem 0.75rem;
      border-radius: 7px;
    }
    .action-status.ok  { background: #d8f3dc; color: var(--green); }
    .action-status.err { background: #f9dada; color: var(--red); }
    .action-status.hidden { display: none; }
  </style>
</head>
<body>

<header>
  <h1>AES Vault</h1>
  <p>AES-256-CBC · шифрование файлов через текстовый ключ</p>
</header>

<div class="main-card">
  <!-- Секция ключа -->
  <div class="key-section">
    <h2>Ключ шифрования (hex, 64 символа)</h2>
    <div class="key-input-wrapper">
      <input type="text" class="key-input" id="key-input" placeholder="Введи 64-символьный hex-ключ или сгенерируй новый">
      <button class="btn-small" onclick="generateKey()">Сгенерировать</button>
    </div>
    <div class="key-hint">Пример: d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6</div>
    <div class="key-status hidden" id="key-status"></div>
  </div>

  <div class="divider"></div>

  <!-- Шифрование -->
  <div class="action-group">
    <h3>🔒 Зашифровать файл</h3>
    <div class="drop" id="enc-drop" onclick="document.getElementById('enc-file').click()">
      <span class="drop-label" id="enc-file-label">выбери файл</span>
      <button class="btn-pick" onclick="event.stopPropagation(); document.getElementById('enc-file').click()">Обзор</button>
    </div>
    <input type="file" id="enc-file" hidden>
    <button class="btn btn-dark" id="btn-enc" onclick="doEncrypt()">Зашифровать →</button>
    <div class="action-status hidden" id="enc-status"></div>
  </div>

  <div class="divider"></div>

  <!-- Расшифрование -->
  <div class="action-group">
    <h3>🔓 Расшифровать файл</h3>
    <div class="drop" id="dec-drop" onclick="document.getElementById('dec-file').click()">
      <span class="drop-label" id="dec-file-label">выбери .enc файл</span>
      <button class="btn-pick" onclick="event.stopPropagation(); document.getElementById('dec-file').click()">Обзор</button>
    </div>
    <input type="file" id="dec-file" accept=".enc" hidden>
    <button class="btn btn-dark" id="btn-dec" onclick="doDecrypt()">Расшифровать →</button>
    <div class="action-status hidden" id="dec-status"></div>
  </div>
</div>

<script>
// ── file inputs ──────────────────────────────────────────────────────────────
function bindDrop(dropId, inputId, labelId) {
  const drop  = document.getElementById(dropId);
  const input = document.getElementById(inputId);
  const label = document.getElementById(labelId);

  input.addEventListener("change", () => {
    if (input.files[0]) { label.textContent = input.files[0].name; drop.classList.add("filled"); }
  });
  drop.addEventListener("dragover",  e => { e.preventDefault(); drop.classList.add("over"); });
  drop.addEventListener("dragleave", () => drop.classList.remove("over"));
  drop.addEventListener("drop", e => {
    e.preventDefault(); drop.classList.remove("over");
    const f = e.dataTransfer.files[0];
    if (!f) return;
    const dt = new DataTransfer(); dt.items.add(f); input.files = dt.files;
    label.textContent = f.name; drop.classList.add("filled");
  });
}

bindDrop("enc-drop", "enc-file", "enc-file-label");
bindDrop("dec-drop", "dec-file", "dec-file-label");

// ── helpers ──────────────────────────────────────────────────────────────────
function keyStatus(msg, type) {
  const el = document.getElementById("key-status");
  el.textContent = msg;
  el.className = "key-status " + type;
  el.classList.remove("hidden");
}

function actionStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = "action-status " + type;
  el.classList.remove("hidden");
}

function download(blob, name) {
  const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(blob), download: name });
  document.body.appendChild(a); a.click(); a.remove();
}

async function generateKey() {
  try {
    const res = await fetch("/generate-key", { method: "POST" });
    const data = await res.json();
    if (data.key) {
      document.getElementById("key-input").value = data.key;
      keyStatus("✓ Новый ключ сгенерирован и вставлен в поле", "ok");
    } else {
      keyStatus("✗ Ошибка генерации ключа", "err");
    }
  } catch {
    keyStatus("✗ Нет соединения с сервером", "err");
  }
}

async function doEncrypt() {
  const file = document.getElementById("enc-file").files[0];
  const key = document.getElementById("key-input").value.trim();
  
  if (!file) return actionStatus("enc-status", "⚠ Выбери файл", "err");
  if (!key) return actionStatus("enc-status", "⚠ Введи или сгенерируй ключ", "err");

  const fd = new FormData();
  fd.append("file", file);
  fd.append("key", key);

  const btn = document.getElementById("btn-enc");
  btn.disabled = true;
  btn.textContent = "Шифрую…";
  
  try {
    const res = await fetch("/encrypt", { method: "POST", body: fd });
    if (res.headers.get("content-type")?.includes("application/json")) {
      const { error } = await res.json();
      actionStatus("enc-status", "✗ " + error, "err");
      return;
    }
    const blob = await res.blob();
    download(blob, file.name + ".enc");
    actionStatus("enc-status", "✓ " + file.name + ".enc готов", "ok");
  } catch {
    actionStatus("enc-status", "✗ Ошибка соединения", "err");
  } finally {
    btn.disabled = false;
    btn.textContent = "Зашифровать →";
  }
}

async function doDecrypt() {
  const file = document.getElementById("dec-file").files[0];
  const key = document.getElementById("key-input").value.trim();
  
  if (!file) return actionStatus("dec-status", "⚠ Выбери .enc файл", "err");
  if (!key) return actionStatus("dec-status", "⚠ Введи ключ", "err");

  const fd = new FormData();
  fd.append("file", file);
  fd.append("key", key);

  const btn = document.getElementById("btn-dec");
  btn.disabled = true;
  btn.textContent = "Расшифровываю…";
  
  try {
    const res = await fetch("/decrypt", { method: "POST", body: fd });
    if (res.headers.get("content-type")?.includes("application/json")) {
      const { error } = await res.json();
      actionStatus("dec-status", "✗ " + error, "err");
      return;
    }
    const blob = await res.blob();
    const outName = file.name.endsWith(".enc") ? file.name.slice(0, -4) : file.name + ".decrypted";
    download(blob, outName);
    actionStatus("dec-status", "✓ Расшифровано: " + outName, "ok");
  } catch {
    actionStatus("dec-status", "✗ Ошибка соединения", "err");
  } finally {
    btn.disabled = false;
    btn.textContent = "Расшифровать →";
  }
}
</script>
</body>
</html>
